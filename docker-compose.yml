
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=bharath@2005
      - MSSQL_MEMORY_LIMIT_MB=1024
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P bharath@2005 -Q 'SELECT 1' -No || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=sqlserver://mssql:1433;database=CRM_DB;user=sa;password=bharath@2005;encrypt=false;trustServerCertificate=true
      - JWT_SECRET=your_jwt_secret_key
      - MAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=465
      - EMAIL_SECURE=true
      - EMAIL_USER=bharath0502325@gmail.com
      - EMAIL_PASS=hthkbytmotoeumjc
    depends_on:
      mssql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
