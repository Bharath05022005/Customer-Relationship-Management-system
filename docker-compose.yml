version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_SERVER=${DB_SERVER:-localhost}
      - DB_DATABASE=${DB_DATABASE:-your_database_name}
      - DB_USER=${DB_USER:-your_db_username}
      - DB_PASSWORD=${DB_PASSWORD:-your_db_password}
      - PORT=5000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
