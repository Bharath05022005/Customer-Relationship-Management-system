

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=bharath@2005
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=sqlserver://mssql:1433;database=CRM_DB;user=sa;password=bharath@2005;encrypt=false;trustServerCertificate=true
      - JWT_SECRET=your_jwt_secret_key
      - MAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=465
      - EMAIL_SECURE=true
      - EMAIL_USER=bharath0502325@gmail.com
      - EMAIL_PASS=hthkbytmotoeumjc
    depends_on:
      - mssql
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
