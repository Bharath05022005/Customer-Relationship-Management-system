    <polygon points="30,15 90,25 60,55 10,60" fill="#00E5FF" />
    <polygon points="10,60 60,55 60,85" fill="#004D40" />
    <polygon points="10,60 60,85 90,115 30,105" fill="#00BFA5" />
  </g>

  <!-- CRM Text -->
