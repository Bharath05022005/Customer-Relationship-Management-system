<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" fill="none">
  <!-- C Logo -->
  <g transform="translate(0, 0)">
    <polygon points="30,0 90,10 60,40 10,45" fill="#00E5FF" />
    <polygon points="10,45 60,40 60,70" fill="#004D40" />
    <polygon points="10,45 60,70 90,100 30,90" fill="#00BFA5" />
  </g>

  <!-- CRM Text Overlapping as a Badge -->
  <g transform="translate(50, 105) skewX(-15)">
    <!-- Dark Outline to separate text from logo -->
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="44" fill="#0A1929" stroke="#0A1929" stroke-width="8" stroke-linejoin="round" letter-spacing="1">CRM</text>
    <!-- Bright Neon Text -->
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="44" fill="#00E5FF" letter-spacing="1">CRM</text>
  </g>
</svg>