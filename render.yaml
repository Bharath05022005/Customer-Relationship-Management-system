services:
  # Backend Node.js API Service
  - type: web
    name: custora-api
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true # Render will auto-generate a secure random string
      - key: DATABASE_URL
        sync: false # You must add your SQL Server connection string manually in the Render dashboard

  # Frontend React Static Site
  - type: web
    name: custora-app
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: custora-api
          envVarKey: RENDER_EXTERNAL_URL
